spec_version: 1
name: colorblind_env
version: 0.5.0
type: space
runtime: fastapi
app: server.app:app
port: 7860

description: |
  RL environment for improving scatter plot accessibility for colorblind users.
  An agent learns to recolor and reshape scatter plot categories so they are
  distinguishable under deuteranopia, protanopia, and tritanopia.

tasks:
  - id: task_easy
    name: Fix color contrast
    max_steps: 10
    description: >
      Fix a scatter plot with 2 color-confused categories for one colorblind type
      (deuteranopia). Agent must recolor only. Grader checks CIEDE2000 delta-E
      across the single CB simulation. Expected score: 0.85–0.95.
    difficulty: easy
    has_grader: true
    grader: graders.easy:EasyGrader

  - id: task_medium
    name: Handle overlapping colors
    max_steps: 20
    description: >
      Fix a scatter plot with 5 similar colors affecting two colorblind types.
      Agent may recolor or change shapes; color is primary. Soft action budget —
      exceeding it adds penalties but does not stop the episode. No efficiency bonus.
      Expected score: 0.60–0.80.
    difficulty: medium
    has_grader: true
    grader: graders.medium:MediumGrader

  - id: task_hard
    name: Optimize full plot accessibility
    max_steps: 30
    description: >
      Fix a scatter plot with 10 similar colors across three colorblind types.
      Agent must recolor and change shapes within a strict action budget. Efficiency
      bonus awarded for solving quickly; regression and redundant-action penalties apply.
      Expected score: 0.30–0.50.
    difficulty: hard
    has_grader: true
    grader: graders.hard:HardGrader

metadata:
  domain: ai
  tags: [rl, accessibility, visualization, colorblind, openenv]